<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Crash Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: #0a0c15; color: #e0e0e0; padding:20px; }
        .container { max-width:1200px; margin:0 auto; }
        h1 { color: #00f2ff; margin-bottom:20px; }
        .tabs { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
        .tab { padding:10px 20px; background:#1e2333; border:none; color:white; cursor:pointer; border-radius:8px; font-weight:600; }
        .tab.active { background:#00f2ff; color:#000; }
        .section { display:none; background:#161b29; padding:20px; border-radius:16px; }
        .section.active { display:block; }
        table { width:100%; border-collapse:collapse; font-size:14px; }
        th { text-align:left; padding:12px 8px; background:#1e2333; color:#aaa; font-weight:600; }
        td { padding:10px 8px; border-bottom:1px solid #2a2f3f; }
        .badge { padding:4px 8px; border-radius:4px; font-size:12px; font-weight:600; }
        .badge.success { background:#00ff88; color:#003311; }
        .badge.warning { background:#ff9900; color:#000; }
        .badge.danger { background:#ff3366; color:#fff; }
        button { padding:6px 12px; border:none; border-radius:6px; cursor:pointer; font-weight:600; transition:0.2s; }
        button.primary { background:#00f2ff; color:#000; }
        button.danger { background:#ff3366; color:#fff; }
        button:active { transform:scale(0.95); }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background:#161b29; padding:30px; border-radius:24px; max-width:400px; width:90%; border:1px solid #00f2ff; }
        .modal-content h3 { margin-bottom:20px; color:#00f2ff; }
        .modal-content input, .modal-content select { width:100%; padding:12px; margin-bottom:15px; background:#0b0e17; border:1px solid #2a2f3f; border-radius:8px; color:white; }
        .modal-buttons { display:flex; gap:10px; }
        hr { margin:15px 0; border-color:#2a2f3f; }
        .status-pending { color:#ff9900; font-weight:bold; }
        .status-confirmed { color:#00ff88; font-weight:bold; }
        .status-rejected { color:#ff3366; font-weight:bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Crash Game Admin Panel</h1>
        <div class="tabs">
            <button class="tab active" onclick="showTab('users')">အသုံးပြုသူများ</button>
            <button class="tab" onclick="showTab('transactions')">ငွေသွင်း/ထုတ်တောင်းဆိုချက်များ</button>
        </div>

        <div id="usersSection" class="section active">
            <h2>အသုံးပြုသူများ</h2>
            <table>
                <thead>
                    <tr><th>ID</th><th>Username</th><th>Balance</th><th>Banned</th><th>Actions</th></tr>
                </thead>
                <tbody id="usersTable"></tbody>
            </table>
        </div>

        <div id="transactionsSection" class="section">
            <h2>ငွေသွင်း/ထုတ်တောင်းဆိုချက်များ</h2>
            <table>
                <thead>
                    <tr><th>User</th><th>Type</th><th>Amount</th><th>Account</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody id="transactionsTable"></tbody>
            </table>
        </div>
    </div>

    <!-- Balance Modal -->
    <div class="modal" id="balanceModal">
        <div class="modal-content">
            <h3>ငွေလက်ကျန်ပြင်ရန်</h3>
            <input type="hidden" id="balanceUserId">
            <p>လက်ကျန်: <span id="currentBalance"></span> MMK</p>
            <select id="balanceAction">
                <option value="add">ထည့်မည်</option>
                <option value="deduct">နုတ်မည်</option>
            </select>
            <input type="number" id="balanceAmount" placeholder="ပမာဏ">
            <div class="modal-buttons">
                <button class="primary" onclick="submitBalance()">အတည်ပြု</button>
                <button onclick="closeBalanceModal()">ပိတ်မည်</button>
            </div>
        </div>
    </div>

    <!-- Ban Modal -->
    <div class="modal" id="banModal">
        <div class="modal-content">
            <h3>အကောင့်ပိတ်ရန်</h3>
            <input type="hidden" id="banUserId">
            <p id="banUserDisplay"></p>
            <input type="text" id="banReason" placeholder="အကြောင်းအရင်း (ချန်လှပ်နိုင်)">
            <div class="modal-buttons">
                <button class="danger" onclick="submitBan(true)">ပိတ်မည်</button>
                <button class="primary" onclick="submitBan(false)">မပိတ်ဘဲနေ</button>
                <button onclick="closeBanModal()">ပိတ်မည်</button>
            </div>
        </div>
    </div>

    <!-- Process Transaction Modal -->
    <div class="modal" id="txModal">
        <div class="modal-content">
            <h3>ငွေလွှဲမှုအတည်ပြု/ငြင်း</h3>
            <input type="hidden" id="txId">
            <p id="txDetails"></p>
            <select id="txStatus">
                <option value="confirmed">အတည်ပြုမည်</option>
                <option value="rejected">ငြင်းပယ်မည်</option>
            </select>
            <input type="text" id="txNote" placeholder="မှတ်ချက် (ချန်လှပ်နိုင်)">
            <div class="modal-buttons">
                <button class="primary" onclick="submitTx()">အတည်ပြု</button>
                <button onclick="closeTxModal()">ပိတ်မည်</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const BACKEND_URL = 'https://crashgame-money2.onrender.com';
        let adminId = null;

        const user = tg.initDataUnsafe?.user;
        if (user) {
            adminId = user.id.toString();
            loadUsers();
            loadTransactions();
        } else {
            document.body.innerHTML = '<h2 style="color:red;">Telegram မှသာဝင်ရောက်ခွင့်ရှိသည်။</h2>';
        }

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            if (tab === 'users') {
                document.querySelector('.tab').classList.add('active');
                document.getElementById('usersSection').classList.add('active');
                loadUsers();
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('transactionsSection').classList.add('active');
                loadTransactions();
            }
        }

        async function loadUsers() {
            const res = await fetch(`${BACKEND_URL}/api/admin/users`, {
                headers: { 'x-telegram-id': adminId }
            });
            const data = await res.json();
            if (data.success) {
                const tbody = document.getElementById('usersTable');
                tbody.innerHTML = data.users.map(u => `
                    <tr>
                        <td>${u.telegramId}</td>
                        <td>${u.username || '—'}</td>
                        <td>${u.balance.toLocaleString()} MMK</td>
                        <td>${u.isBanned ? '❌ ပိတ်ထား' : '✅ ဖွင့်ထား'}</td>
                        <td>
                            <button class="primary" onclick="openBalanceModal('${u.telegramId}', ${u.balance})">ငွေပြင်</button>
                            <button class="${u.isBanned ? 'primary' : 'danger'}" onclick="openBanModal('${u.telegramId}', '${u.username || u.telegramId}', ${u.isBanned})">
                                ${u.isBanned ? 'ပြန်ဖွင့်' : 'ပိတ်'}
                            </button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        async function loadTransactions() {
            const res = await fetch(`${BACKEND_URL}/api/admin/transactions`, {
                headers: { 'x-telegram-id': adminId }
            });
            const data = await res.json();
            if (data.success) {
                const tbody = document.getElementById('transactionsTable');
                tbody.innerHTML = data.transactions.map(tx => `
                    <tr>
                        <td>${tx.username || tx.userId}</td>
                        <td>${tx.type === 'deposit' ? 'ငွေသွင်း' : 'ငွေထုတ်'}</td>
                        <td>${tx.amount} MMK</td>
                        <td>${tx.accountName} (${tx.accountNumber})</td>
                        <td class="status-${tx.status}">${tx.status === 'pending' ? '⏳ ဆိုင်းငံ့' : tx.status === 'confirmed' ? '✅ အတည်ပြု' : '❌ ငြင်းပယ်'}</td>
                        <td>
                            ${tx.status === 'pending' ? `<button class="primary" onclick="openTxModal('${tx._id}', '${tx.type}', ${tx.amount}, '${tx.username}')">ဆောင်ရွက်ရန်</button>` : '—'}
                        </td>
                    </tr>
                `).join('');
            }
        }

        function openBalanceModal(userId, currentBal) {
            document.getElementById('balanceUserId').value = userId;
            document.getElementById('currentBalance').innerText = currentBal;
            document.getElementById('balanceModal').style.display = 'flex';
        }
        function closeBalanceModal() {
            document.getElementById('balanceModal').style.display = 'none';
        }
        async function submitBalance() {
            const userId = document.getElementById('balanceUserId').value;
            const action = document.getElementById('balanceAction').value;
            const amount = parseInt(document.getElementById('balanceAmount').value);
            if (!amount || amount <= 0) { alert('ငွေပမာဏမှန်ကန်စွာထည့်ပါ။'); return; }
            const res = await fetch(`${BACKEND_URL}/api/admin/user/balance`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-telegram-id': adminId },
                body: JSON.stringify({ userId, action, amount })
            });
            const data = await res.json();
            if (data.success) {
                alert('အောင်မြင်သည်။');
                closeBalanceModal();
                loadUsers();
            } else {
                alert('မအောင်မြင်: ' + data.message);
            }
        }

        function openBanModal(userId, display, isBanned) {
            document.getElementById('banUserId').value = userId;
            document.getElementById('banUserDisplay').innerText = display + (isBanned ? ' (ပိတ်ထားဆဲ)' : '');
            document.getElementById('banModal').style.display = 'flex';
        }
        function closeBanModal() {
            document.getElementById('banModal').style.display = 'none';
        }
        async function submitBan(ban) {
            const userId = document.getElementById('banUserId').value;
            const reason = document.getElementById('banReason').value;
            const res = await fetch(`${BACKEND_URL}/api/admin/user/ban`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-telegram-id': adminId },
                body: JSON.stringify({ userId, ban, reason })
            });
            const data = await res.json();
            if (data.success) {
                alert('အောင်မြင်သည်။');
                closeBanModal();
                loadUsers();
            } else {
                alert('မအောင်မြင်: ' + data.message);
            }
        }

        function openTxModal(txId, type, amount, username) {
            document.getElementById('txId').value = txId;
            document.getElementById('txDetails').innerText = `${type === 'deposit' ? 'ငွေသွင်း' : 'ငွေထုတ်'} - ${amount} MMK (${username})`;
            document.getElementById('txModal').style.display = 'flex';
        }
        function closeTxModal() {
            document.getElementById('txModal').style.display = 'none';
        }
        async function submitTx() {
            const txId = document.getElementById('txId').value;
            const status = document.getElementById('txStatus').value;
            const note = document.getElementById('txNote').value;
            const res = await fetch(`${BACKEND_URL}/api/admin/transaction/process`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-telegram-id': adminId },
                body: JSON.stringify({ transactionId: txId, status, adminNote: note })
            });
            const data = await res.json();
            if (data.success) {
                alert('အောင်မြင်သည်။');
                closeTxModal();
                loadTransactions();
            } else {
                alert('မအောင်မြင်: ' + data.message);
            }
        }
    </script>
</body>
</html>
