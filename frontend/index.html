<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRASH PRO - ULTIMATE UI</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --success: #00ff88;
            --danger: #ff3366;
            --bg-dark: #060912;
            --card-bg: rgba(16, 20, 35, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 10% 10%, rgba(0, 242, 255, 0.05) 0%, transparent 30%);
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-shell {
            width: 100%;
            max-width: 480px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* --- HEADER SECTION --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }

        .user-stats {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .user-badge {
            background: linear-gradient(90deg, var(--secondary), transparent);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            border-left: 3px solid var(--primary);
            color: #fff;
        }

        .balance-display {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .nav-btns {
            display: flex;
            gap: 8px;
        }

        .action-sm {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-sm.deposit { border-color: var(--success); color: var(--success); }
        .action-sm.withdraw { border-color: #ff9900; color: #ff9900; }

        /* --- MULTIPLIER SECTION --- */
        .main-display {
            background: var(--card-bg);
            height: 200px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            margin: 10px 0;
        }

        .multiplier-val {
            font-size: 5.5rem;
            font-weight: 900;
            z-index: 1;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0,242,255,0.5));
            letter-spacing: -2px;
        }

        /* --- BETTING CONTROLS --- */
        .control-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .amount-input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            color: var(--primary);
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            outline: none;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .q-chip {
            background: #1a1f2e;
            padding: 12px 5px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
            cursor: pointer;
            border: 1px solid transparent;
            font-weight: bold;
            color: #ccc;
        }

        .q-chip:hover { border-color: var(--primary); color: white; }

        .main-actions {
            display: flex;
            gap: 12px;
        }

        .btn-play {
            flex: 1;
            padding: 20px;
            border-radius: 15px;
            border: none;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.1s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-start { background: var(--success); color: #003311; box-shadow: 0 4px 20px rgba(0,255,136,0.4); }
        .btn-stop { background: var(--danger); color: #fff; box-shadow: 0 4px 20px rgba(255,51,102,0.4); }
        .btn-play:active { transform: scale(0.95); }

        /* --- HISTORY TABLE --- */
        .history-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 18px;
            flex-grow: 1;
        }

        .table-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            padding-bottom: 12px;
            border-bottom: 1px solid #333;
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            font-weight: bold;
        }

        .history-list {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
        }

        .history-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            font-size: 0.9rem;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-weight: 500;
        }

        .val-win { color: var(--success); font-weight: bold; }

        /* --- MODAL --- */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal-box {
            background: #161b29;
            width: 100%;
            max-width: 360px;
            border-radius: 28px;
            padding: 30px;
            border: 1px solid var(--primary);
            text-align: center;
            box-shadow: 0 0 30px rgba(0,242,255,0.2);
        }

        .m-input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: #000;
            border: 1px solid #444;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            font-size: 1rem;
        }

    </style>
</head>
<body>

<div class="app-shell">
    <header class="header">
        <div class="user-stats">
            <div class="user-badge" id="username">TG_USERNAME</div>
            <div class="balance-display"><span id="balance">1,000</span> <small style="font-size: 0.75rem; color: #666;">MMK</small></div>
        </div>
        <div class="nav-btns">
            <button class="action-sm deposit" onclick="showModal('depModal')">ငွေသွင်း</button>
            <button class="action-sm withdraw" onclick="showModal('witModal')">ငွေထုတ်</button>
        </div>
    </header>

    <section class="main-display">
        <div class="multiplier-val" id="multiplier">00.0x</div>
    </section>

    <section class="control-panel">
        <input type="number" class="amount-input" value="1000" id="betAmount">
        
        <div class="quick-grid">
            <div class="q-chip" onclick="setBet(500)">500</div>
            <div class="q-chip" onclick="setBet(1000)">1,000</div>
            <div class="q-chip" onclick="setBet(5000)">5,000</div>
            <div class="q-chip" onclick="setBet(10000)">10,000</div>
        </div>

        <div class="main-actions">
            <button class="btn-play btn-start" id="startBtn">START</button>
            <button class="btn-play btn-stop" id="stopBtn" style="display:none">STOP</button>
        </div>
    </section>

    <section class="history-card">
        <div class="table-header">
            <span>Username</span>
            <span>Start</span>
            <span>Stop</span>
        </div>
        <div class="history-list">
            <div class="history-item">
                <span>Player_01</span>
                <span>1.00x</span>
                <span class="val-win">1.50x</span>
            </div>
            <div class="history-item">
                <span>Gamer_X</span>
                <span>1.00x</span>
                <span style="color:#666">Wait..</span>
            </div>
        </div>
    </section>
</div>

<div class="modal" id="depModal">
    <div class="modal-box">
        <h2 style="margin-bottom:10px;">ငွေသွင်းရန်</h2>
        <div style="background:#000; padding:15px; border-radius:12px; margin-bottom:20px;">
            <p style="color:var(--primary); font-weight:bold; font-size:1.1rem;">KPay: 09792310926</p>
            <p style="color:#aaa; font-size:0.9rem;">Name: KAY KHINE OO</p>
        </div>
        <p style="font-size:0.85rem; color:#888; margin-bottom:10px; text-align:left;">ငွေလွှဲပြေစာ တင်ရန်:</p>
        <input type="file" class="m-input">
        <button class="btn-submit" onclick="hideModal('depModal')">SUBMIT</button>
        <p style="margin-top:20px; cursor:pointer; color: var(--danger); font-weight:bold;" onclick="hideModal('depModal')">CANCEL</p>
    </div>
</div>

<div class="modal" id="witModal">
    <div class="modal-box">
        <h2 style="margin-bottom:20px;">ငွေထုတ်ရန်</h2>
        <input type="text" class="m-input" placeholder="KPay ဖုန်းနံပါတ်">
        <input type="text" class="m-input" placeholder="KPay အမည်">
        <input type="number" class="m-input" placeholder="ထုတ်ယူမည့် ပမာဏ">
        <button class="btn-submit" onclick="hideModal('witModal')">WITHDRAW</button>
        <p style="margin-top:20px; cursor:pointer; color: var(--danger); font-weight:bold;" onclick="hideModal('witModal')">CANCEL</p>
    </div>
</div>

<script>
    function setBet(val) {
        document.getElementById('betAmount').value = val;
    }

    function showModal(id) {
        document.getElementById(id).style.display = 'flex';
    }

    function hideModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    // Start/Stop Toggle Logic
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');

    startBtn.onclick = () => {
        startBtn.style.display = 'none';
        stopBtn.style.display = 'block';
        // Backend function can be called here
    }

    stopBtn.onclick = () => {
        stopBtn.style.display = 'none';
        startBtn.style.display = 'block';
        // Backend function can be called here
    }
</script>

</body>
</html>
