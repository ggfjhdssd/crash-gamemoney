<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CRASH PRO</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* ── Design tokens ───────────────────────────────────── */
    :root {
      --primary:   #00f2ff;
      --secondary: #7000ff;
      --success:   #00ff88;
      --danger:    #ff3366;
      --gold:      #ffd700;
      --orange:    #ff9900;
      --bg:        #060912;
      --card:      rgba(16,20,35,0.95);
      --border:    rgba(255,255,255,0.05);
      --muted:     #8a8f9e;
      --divider:   #2a2f3f;
    }

    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: #fff;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      overscroll-behavior: none;
    }

    /* ── Layout ──────────────────────────────────────────── */
    .shell {
      width: 100%;
      max-width: 480px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Header ──────────────────────────────────────────── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }
    .user-info { display: flex; flex-direction: column; gap: 4px; }
    .badge {
      background: linear-gradient(90deg, var(--secondary), transparent);
      padding: 3px 12px;
      border-radius: 4px;
      font-size: .82rem;
      font-weight: 700;
      border-left: 3px solid var(--primary);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .balance-wrap {
      font-size: 1.45rem;
      font-weight: 800;
      color: var(--primary);
      text-shadow: 0 0 10px rgba(0,242,255,.45);
    }
    .balance-wrap small { font-size: .72rem; color: var(--muted); }
    .nav { display: flex; gap: 8px; }
    .nav-btn {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.05);
      color: #fff;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .nav-btn:active { opacity: .7; }
    .nav-btn.dep  { border-color: var(--success); color: var(--success); }
    .nav-btn.with { border-color: var(--orange);  color: var(--orange);  }

    /* ── Game display ────────────────────────────────────── */
    .game-display {
      position: relative;
      height: 200px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,.5);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Crash point history bar */
    .crash-bar {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      gap: 6px;
      z-index: 5;
      overflow: hidden;
    }
    .crash-pill {
      padding: 3px 8px;
      border-radius: 20px;
      font-size: .7rem;
      font-weight: 700;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.1);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .crash-pill.high { color: var(--success); }
    .crash-pill.mid  { color: var(--orange);  }
    .crash-pill.low  { color: var(--danger);  }

    .mult-val {
      font-size: 5.5rem;
      font-weight: 900;
      letter-spacing: -2px;
      z-index: 2;
      background: linear-gradient(to bottom, #fff, #999);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 20px rgba(0,242,255,.5));
      transition: -webkit-text-fill-color .15s;
      will-change: contents; /* hint browser — text changes frequently */
    }
    .mult-val.crashed {
      -webkit-text-fill-color: var(--danger) !important;
      filter: drop-shadow(0 0 20px rgba(255,51,102,.6));
    }

    /* ── Countdown overlay ───────────────────────────────── */
    .cd-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(3px);
      border-radius: 24px;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity .25s;
    }
    .cd-overlay.visible { opacity: 1; }
    .cd-ring {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(0,242,255,.12);
      border: 3px solid var(--primary);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px var(--primary);
      animation: glow 1s infinite alternate;
    }
    .cd-num {
      font-size: 4rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 20px var(--primary);
    }
    .cd-label {
      font-size: 1.4rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-left: 16px;
    }
    @keyframes glow {
      from { box-shadow: 0 0 20px var(--primary); }
      to   { box-shadow: 0 0 45px var(--primary); }
    }

    /* ── Control panel ───────────────────────────────────── */
    .panel {
      background: var(--card);
      padding: 18px;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border: 1px solid var(--border);
    }
    .amount-in {
      width: 100%;
      background: #0b0e17;
      border: 1px solid var(--divider);
      border-radius: 12px;
      padding: 14px;
      color: #fff;
      font-size: 1.25rem;
      font-weight: 700;
      text-align: center;
      outline: none;
      transition: border-color .15s;
    }
    .amount-in:focus { border-color: var(--primary); }
    .chips {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .chip {
      background: #1e2333;
      padding: 11px 4px;
      border-radius: 8px;
      font-size: .88rem;
      text-align: center;
      cursor: pointer;
      border: 1px solid transparent;
      font-weight: 600;
      color: #ccc;
      transition: border-color .15s, color .15s, background .15s;
      user-select: none;
    }
    .chip:hover  { border-color: var(--primary); color: #fff; background: #2a3042; }
    .chip.locked { opacity: .35; pointer-events: none; }

    /* ── Main action button ──────────────────────────────── */
    .main-btn {
      width: 100%;
      padding: 18px;
      border-radius: 15px;
      border: none;
      font-size: 1.2rem;
      font-weight: 900;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: transform .08s, opacity .15s, background .2s;
      will-change: transform;
    }
    .main-btn:active:not(:disabled) { transform: scale(.96); }
    .main-btn:disabled { opacity: .5; cursor: not-allowed; }

    .main-btn.mode-start {
      background: var(--success);
      color: #003311;
      box-shadow: 0 4px 20px rgba(0,255,136,.4);
    }
    .main-btn.mode-stop-wait {
      background: #883355;
      color: #ffd;
      box-shadow: none;
    }
    .main-btn.mode-stop {
      background: var(--danger);
      color: #fff;
      box-shadow: 0 4px 20px rgba(255,51,102,.45);
    }
    .main-btn.mode-win {
      background: linear-gradient(135deg, var(--gold), var(--orange));
      color: #000;
      font-size: 1rem;
      box-shadow: 0 4px 20px rgba(255,215,0,.45);
    }
    .main-btn.mode-idle {
      background: #1e2333;
      color: var(--muted);
    }

    /* ── History table ───────────────────────────────────── */
    .hist-card {
      background: var(--card);
      border-radius: 24px;
      padding: 16px;
      border: 1px solid var(--border);
    }
    .hist-head {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--divider);
      font-size: .77rem;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 700;
    }
    .hist-body {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      max-height: 210px;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    .hist-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      font-size: .88rem;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,.03);
      font-weight: 500;
      /* GPU-composited transition for status color change */
      transition: color .2s;
    }
    .hist-row .name  { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hist-row .name.bot { color: var(--orange); font-style: italic; }
    .c-win   { color: var(--success); font-weight: 700; }
    .c-crash { color: var(--danger);  font-weight: 800; letter-spacing: .5px; }
    .c-play  { color: #555; }

    /* ── Modals ──────────────────────────────────────────── */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.88);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      backdrop-filter: blur(10px);
    }
    .modal.open { display: flex; }
    .modal-box {
      background: var(--card);
      width: 90%;
      max-width: 400px;
      border-radius: 28px;
      padding: 28px 22px;
      border: 1px solid var(--primary);
      box-shadow: 0 0 40px rgba(0,242,255,.3);
    }
    .modal-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 18px;
      text-align: center;
    }
    .bank-box {
      background: #0b0e17;
      border: 1px solid var(--divider);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 18px;
      text-align: center;
    }
    .bank-box .ph { color: var(--primary); font-size: 1.2rem; font-weight: 700; }
    .bank-box .nm { color: var(--orange);  font-weight: 500; font-size: .9rem; }
    .modal-in {
      width: 100%;
      padding: 13px;
      margin-bottom: 12px;
      background: #0b0e17;
      border: 1px solid var(--divider);
      border-radius: 12px;
      color: #fff;
      font-size: .95rem;
      outline: none;
    }
    .modal-in:focus { border-color: var(--primary); }
    .modal-note { font-size: .78rem; color: var(--muted); text-align: center; margin-top: 8px; }
    .modal-btns { display: flex; gap: 10px; margin-top: 18px; }
    .modal-btn {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    .modal-btn:active { opacity: .75; }
    .modal-btn.ok  { background: var(--primary); color: #000; }
    .modal-btn.cnl { background: #2a2f3f; color: #fff; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     CLIENT SCRIPT
     ═══════════════════════════════════════════════════════════ -->
<script>
'use strict';

/* ── Telegram WebApp ─────────────────────────────────────────────────────── */
const tg = window.Telegram?.WebApp ?? { expand(){}, ready(){}, initDataUnsafe:{},
  showAlert(m){ alert(m); }, setHeaderColor(){}, setBackgroundColor(){} };
tg.expand(); tg.ready();
tg.setHeaderColor('#060912');
tg.setBackgroundColor('#060912');

const BACKEND = 'https://crashgame-money2.onrender.com'; // ← your Render URL

/* ── DOM refs (cache once) ───────────────────────────────────────────────── */
const $  = id => document.getElementById(id);
const DOM = {
  name:      $('uName'),
  balance:   $('uBalance'),
  multVal:   $('multVal'),
  cdOverlay: $('cdOverlay'),
  cdNum:     $('cdNum'),
  cdLabel:   $('cdLabel'),
  histBody:  $('histBody'),
  crashBar:  $('crashBar'),
  btn:       $('mainBtn'),
  betAmt:    $('betAmt'),
  chips:     document.querySelectorAll('.chip'),
};

/* ── Client state ────────────────────────────────────────────────────────── */
let state = {
  telegramId:   null,
  username:     '',
  phase:        'idle',     // 'countdown' | 'running' | 'crashed'
  gameId:       null,
  hasBet:       false,
  currentBetAmt:0,
  cdTimer:      null,       // clearInterval handle for countdown animation
  isConnected:  false,
};

/* ── Efficient active-bet row map ────────────────────────────────────────── */
// username → <div.hist-row> element
// Reuse existing DOM nodes instead of innerHTML rebuild
const liveRows = new Map();

/* ─────────────────────────────────────────────────────────────────────────
   BUTTON STATE MACHINE
   mode: 'idle' | 'start' | 'stop-wait' | 'stop' | 'win'
   ───────────────────────────────────────────────────────────────────────── */
function setBtn(mode, label) {
  const b = DOM.btn;
  b.className = 'main-btn mode-' + mode;
  b.disabled  = (mode === 'idle' || mode === 'stop-wait' || mode === 'win');
  b.textContent = label ?? {
    idle:       'START',
    start:      'START',
    'stop-wait':'STOP ⏳',
    stop:       'STOP',
    win:        'အနိုင်ရရှိသည်',
  }[mode];
}

/* ─────────────────────────────────────────────────────────────────────────
   CHIPS — lock/unlock
   ───────────────────────────────────────────────────────────────────────── */
function lockChips(lock) {
  DOM.chips.forEach(c => c.classList.toggle('locked', lock));
}
DOM.chips.forEach(c => c.addEventListener('click', () => {
  DOM.betAmt.value = c.dataset.val;
}));

/* ─────────────────────────────────────────────────────────────────────────
   MULTIPLIER DISPLAY
   Update text node directly — no style recalc from innerHTML
   ───────────────────────────────────────────────────────────────────────── */
let _lastMult = '';
function setMult(val, crashed = false) {
  const txt = val.toFixed(2) + 'x';
  if (txt !== _lastMult) {
    DOM.multVal.textContent = txt;
    _lastMult = txt;
  }
  DOM.multVal.classList.toggle('crashed', crashed);
}

/* ─────────────────────────────────────────────────────────────────────────
   COUNTDOWN UI
   ───────────────────────────────────────────────────────────────────────── */
function startCdUI(seconds) {
  clearInterval(state.cdTimer);
  DOM.cdOverlay.classList.add('visible');
  DOM.cdNum.textContent   = seconds;
  DOM.cdLabel.textContent = 'GET READY';
  let cnt = seconds;

  state.cdTimer = setInterval(() => {
    cnt--;
    if (cnt > 0) {
      DOM.cdNum.textContent = cnt;
    } else if (cnt === 0) {
      DOM.cdNum.textContent   = 'GO!';
      DOM.cdLabel.textContent = '';
    } else {
      clearInterval(state.cdTimer);
      setTimeout(() => DOM.cdOverlay.classList.remove('visible'), 350);
    }
  }, 1000);
}

/* ─────────────────────────────────────────────────────────────────────────
   CRASH HISTORY BAR (top of game display)
   ───────────────────────────────────────────────────────────────────────── */
const crashHistory = [];   // last 8 crash points

function pushCrashHistory(point) {
  crashHistory.unshift(point);
  if (crashHistory.length > 8) crashHistory.pop();
  renderCrashBar();
}

function renderCrashBar() {
  // Use a DocumentFragment to batch DOM writes
  const frag = document.createDocumentFragment();
  crashHistory.forEach(pt => {
    const pill = document.createElement('span');
    pill.className = 'crash-pill ' + (pt >= 3 ? 'high' : pt >= 1.5 ? 'mid' : 'low');
    pill.textContent = pt.toFixed(2) + 'x';
    frag.appendChild(pill);
  });
  DOM.crashBar.replaceChildren(frag);
}

/* ─────────────────────────────────────────────────────────────────────────
   HISTORY LIST — efficient DOM management
   Each player's row is stored in liveRows Map and updated IN-PLACE.
   No full list rebuild on activeBets or newHistory events.
   ───────────────────────────────────────────────────────────────────────── */
const MAX_HIST_ROWS = 25;

function createRow(username, isBot) {
  const row  = document.createElement('div');
  row.className = 'hist-row';

  const nameEl  = document.createElement('span');
  nameEl.className = 'name' + (isBot ? ' bot' : '');
  nameEl.textContent = username;

  const startEl = document.createElement('span');
  startEl.textContent = '1.00x';

  const stopEl  = document.createElement('span');
  stopEl.className = 'c-play';
  stopEl.textContent = 'Playing..';

  row.appendChild(nameEl);
  row.appendChild(startEl);
  row.appendChild(stopEl);

  row._stopEl = stopEl;   // fast reference
  return row;
}

/** Set a row's stop-cell to win / crash / playing state without touching other cells */
function setRowStop(row, status, val) {
  const el = row._stopEl;
  if (status === 'playing') {
    el.className   = 'c-play';
    el.textContent = 'Playing..';
  } else if (status === 'won') {
    el.className   = 'c-win';
    el.textContent = Number(val).toFixed(2) + 'x';
  } else {
    el.className   = 'c-crash';
    el.textContent = 'CRASH';
  }
}

/** Rebuild the playing rows at the start of each game.
 *  Only called once per game — NOT on every multiplier tick. */
function renderActiveBets(bets) {
  // Remove rows that are no longer active
  const incomingNames = new Set(bets.map(b => b.username));
  for (const [name, row] of liveRows.entries()) {
    if (!incomingNames.has(name)) {
      row.remove();
      liveRows.delete(name);
    }
  }

  // Add rows for new bets
  const frag = document.createDocumentFragment();
  bets.forEach(b => {
    if (!liveRows.has(b.username)) {
      const row = createRow(b.username, b.isBot);
      liveRows.set(b.username, row);
      frag.appendChild(row);
    }
  });
  // Prepend new rows before existing finished rows
  DOM.histBody.insertBefore(frag, DOM.histBody.firstChild);

  trimHistory();
}

/** Called when someone cashes out or we receive a loss entry */
function addOrUpdateHistory(d) {
  const { username, stop, status, isBot } = d;

  if (liveRows.has(username)) {
    // In-place DOM update — ZERO layout recalculation overhead
    const row = liveRows.get(username);
    setRowStop(row, status === 'won' ? 'won' : 'crash', stop);
    // Move to top
    DOM.histBody.insertBefore(row, DOM.histBody.firstChild);
    liveRows.delete(username);
  } else {
    // Fallback: brand new row (late-join scenario)
    const row = createRow(username, isBot);
    setRowStop(row, status === 'won' ? 'won' : 'crash', stop);
    DOM.histBody.insertBefore(row, DOM.histBody.firstChild);
  }
  trimHistory();
}

/** Crash all remaining Playing.. rows instantly */
function crashAllLive() {
  for (const [, row] of liveRows.entries()) {
    setRowStop(row, 'crash', 0);
    DOM.histBody.insertBefore(row, DOM.histBody.firstChild);
  }
  liveRows.clear();
}

function trimHistory() {
  const rows = DOM.histBody.children;
  while (rows.length > MAX_HIST_ROWS) {
    DOM.histBody.removeChild(rows[rows.length - 1]);
  }
}

/* ─────────────────────────────────────────────────────────────────────────
   BALANCE display
   ───────────────────────────────────────────────────────────────────────── */
function setBalance(val) {
  DOM.balance.textContent = Number(val).toLocaleString();
}

/* ─────────────────────────────────────────────────────────────────────────
   AUTH + INIT
   ───────────────────────────────────────────────────────────────────────── */
(async function init() {
  const tgUser = tg.initDataUnsafe?.user;
  if (tgUser) {
    state.username = tgUser.username
      || `${tgUser.first_name ?? ''}${tgUser.last_name ? ' ' + tgUser.last_name : ''}`
      || `User_${String(tgUser.id).slice(-4)}`;
    state.telegramId = String(tgUser.id);
    DOM.name.textContent = state.username;

    try {
      const res = await fetch(`${BACKEND}/api/auth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          id:         tgUser.id,
          username:   state.username,
          first_name: tgUser.first_name,
          last_name:  tgUser.last_name,
        }),
      });
      const data = await res.json();
      if (data.success) {
        setBalance(data.user.balance);
        connectSocket();
      } else {
        tg.showAlert(data.banned ? '⛔ Account ပိတ်ထားသည်။' : '❌ Auth failed');
      }
    } catch {
      tg.showAlert('❌ Server ချိတ်ဆက်မရ — retry in 3s');
      setTimeout(init, 3000);
    }
  } else {
    // Dev/browser fallback
    state.telegramId = 'dev_' + Math.random().toString(36).slice(2, 7);
    state.username   = 'Dev User';
    DOM.name.textContent = state.username;
    connectSocket();
  }
})();

/* ─────────────────────────────────────────────────────────────────────────
   SOCKET.IO — robust connection with auto-reconnect
   ───────────────────────────────────────────────────────────────────────── */
let socket;

function connectSocket() {
  socket = io(BACKEND, {
    query:       { userId: state.telegramId },
    transports:  ['websocket', 'polling'],
    reconnection: true,
    reconnectionDelay:     1000,
    reconnectionDelayMax:  5000,
    reconnectionAttempts:  Infinity,
  });

  /* ── connect ── */
  socket.on('connect', () => {
    state.isConnected = true;
    console.log('🟢 Socket connected:', socket.id);
    socket.emit('authenticate', { userId: state.telegramId });
  });

  /* ── gameState (full sync on reconnect) ──────────────────────────────── */
  socket.on('gameState', (data) => {
    state.phase  = data.phase;
    state.gameId = data.gameId;
    setMult(data.multiplier ?? 1.0, data.phase === 'crashed');

    if (data.phase === 'running' && state.hasBet) setBtn('stop');
    else if (data.phase === 'running')             setBtn('idle');
    else if (data.phase === 'countdown')           setBtn('start');
    else                                            setBtn('idle');

    // Populate crash history bar
    (data.history ?? []).forEach(h => pushCrashHistory(h.crashPoint));
  });

  /* ── countdown ───────────────────────────────────────────────────────── */
  socket.on('countdown', (data) => {
    state.phase  = 'countdown';
    state.gameId = data.gameId;
    state.hasBet = false;
    setMult(1.0, false);
    startCdUI(data.seconds);
    lockChips(false);
    setBtn('start');
  });

  /* ── gameStart ───────────────────────────────────────────────────────── */
  socket.on('gameStart', (data) => {
    state.phase = 'running';
    clearInterval(state.cdTimer);
    DOM.cdOverlay.classList.remove('visible');
    lockChips(true);

    // Refresh active bets display
    if (data.bets) renderActiveBets(data.bets);

    // Button transitions: if user bet during countdown → STOP enabled
    setBtn(state.hasBet ? 'stop' : 'idle');
  });

  /* ── multiplier ──────────────────────────────────────────────────────── */
  socket.on('multiplier', (data) => {
    // Only update text — no class or layout change unless crashed
    setMult(data.multiplier, false);
  });

  /* ── gameCrashed ─────────────────────────────────────────────────────── */
  socket.on('gameCrashed', (data) => {
    state.phase = 'crashed';
    setMult(data.multiplier, true);   // red multiplier
    pushCrashHistory(data.multiplier);

    // ★ Instantly update all "Playing.." rows to CRASH
    crashAllLive();

    // Button reset
    if (state.hasBet) {
      // User had uncashed bet → lost
      setBtn('idle');
      state.hasBet = false;
    }
    // If user already won (betResult fired) → button already in 'win' mode; leave it
  });

  /* ── activeBets — called during countdown and on cashout ─────────────── */
  socket.on('activeBets', (data) => {
    // Only rebuild if we're in countdown phase (game-start does its own render)
    if (state.phase === 'countdown') {
      renderActiveBets(data.bets ?? []);
    }
  });

  /* ── newHistory — cashout or loss of a single player ─────────────────── */
  socket.on('newHistory', (d) => {
    addOrUpdateHistory(d);
  });

  /* ── betResult — the current user's cashout confirmed ────────────────── */
  socket.on('betResult', (d) => {
    if (!d.success || d.type !== 'cashout') return;
    if (d.userId !== state.telegramId) return;   // not our event

    const total    = d.totalReturn ?? (state.currentBetAmt + d.profit);
    const rounded  = Math.round(total);
    const winLabel = `အနိုင်ရရှိ — ${rounded.toLocaleString()} MMK`;

    setBtn('win', winLabel);
    state.hasBet = false;

    tg.showAlert(
      `✅ အနိုင်ရရှိသည်!\n` +
      `Multiplier : ${d.multiplier}x\n` +
      `စုစုပေါင်း  : ${rounded.toLocaleString()} MMK`
    );
  });

  /* ── balanceUpdate ───────────────────────────────────────────────────── */
  socket.on('balanceUpdate', (d) => {
    if (d.userId === state.telegramId) setBalance(d.balance);
  });

  /* ── disconnect / reconnect ──────────────────────────────────────────── */
  socket.on('disconnect', (reason) => {
    state.isConnected = false;
    console.warn('🔴 Socket disconnected:', reason);
  });

  socket.on('reconnect', (attempt) => {
    state.isConnected = true;
    console.log('🔄 Reconnected after', attempt, 'attempts');
    socket.emit('authenticate', { userId: state.telegramId });
  });

  socket.on('connect_error', (err) => {
    console.error('Socket connect_error:', err.message);
  });
}

/* ─────────────────────────────────────────────────────────────────────────
   MAIN BUTTON — click handler
   ───────────────────────────────────────────────────────────────────────── */
DOM.btn.addEventListener('click', () => {
  if (state.phase === 'running' && state.hasBet) {
    // ── STOP / Cash out ──────────────────────────────────────────
    DOM.btn.disabled = true;   // prevent double-tap while waiting for response
    const mult = parseFloat(DOM.multVal.textContent) || 1.0;

    socket.emit('cashOut', {
      userId:     state.telegramId,
      multiplier: mult,
      gameId:     state.gameId,     // ★ send gameId for server-side validation
    }, (res) => {
      if (!res?.success) {
        DOM.btn.disabled = false;   // re-enable if failed
        tg.showAlert('❌ ' + (res?.message ?? 'Cashout မအောင်မြင်'));
      }
      // On success, betResult event will update button
    });
    return;
  }

  if (state.phase !== 'countdown') {
    tg.showAlert('❌ Countdown အတွင်းသာ Bet လောင်းနိုင်သည်။');
    return;
  }
  if (state.hasBet) {
    tg.showAlert('❌ ဤပတ်တွင် Bet လောင်းပြီးပါပြီ။');
    return;
  }

  // ── Place bet ────────────────────────────────────────────────
  const amt = parseFloat(DOM.betAmt.value);
  const bal = parseFloat(DOM.balance.textContent.replace(/,/g, ''));
  if (!amt || amt <= 0)      { tg.showAlert('❌ ငွေပမာဏထည့်ပါ။');  return; }
  if (amt > bal)             { tg.showAlert('❌ လက်ကျန်မလုံလောက်'); return; }
  if (!state.isConnected)    { tg.showAlert('❌ ချိတ်ဆက်မှုမရှိ');   return; }

  state.currentBetAmt = amt;
  DOM.btn.disabled = true;   // prevent double-tap

  socket.emit('placeBet', {
    userId:   state.telegramId,
    username: state.username,
    amount:   amt,
  }, (res) => {
    if (res?.success) {
      state.hasBet = true;
      if (res.newBalance != null) setBalance(res.newBalance);
      // Show STOP (disabled) immediately — enabled when gameStart fires
      setBtn('stop-wait', 'STOP ⏳');
    } else {
      DOM.btn.disabled = false;
      tg.showAlert('❌ ' + (res?.message ?? 'Bet မအောင်မြင်'));
    }
  });
});

/* ─────────────────────────────────────────────────────────────────────────
   MODAL helpers
   ───────────────────────────────────────────────────────────────────────── */
const modalIds = { dep: 'modalDep', with: 'modalWith' };

function openModal(type) {
  document.getElementById(modalIds[type])?.classList.add('open');
}
function closeModal(type) {
  const el = document.getElementById(modalIds[type]);
  el?.classList.remove('open');
  // Clear inputs
  el?.querySelectorAll('input').forEach(i => i.value = '');
}
// Expose globally for onclick attributes
window.openModal  = openModal;
window.closeModal = closeModal;

/* ── Deposit ─────────────────────────────────────────────────────────────── */
window.submitDeposit = async () => {
  const name   = $('dName').value.trim();
  const phone  = $('dPhone').value.trim();
  const amount = parseInt($('dAmount').value);
  if (!name || !phone || !amount) { tg.showAlert('❌ အချက်အလက်အပြည့်ထည့်ပါ။'); return; }
  if (amount < 3000)              { tg.showAlert('❌ အနည်းဆုံး 3000 MMK ဖြစ်ရမည်။'); return; }
  try {
    const r = await fetch(`${BACKEND}/api/deposit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: state.telegramId, username: state.username, name, phone, amount }),
    });
    const d = await r.json();
    tg.showAlert(d.success
      ? `✅ ငွေသွင်းတောင်းဆိုချက် (${amount.toLocaleString()} MMK) ပို့ပြီးပါပြီ။\nAdmin အတည်ပြုပါလိမ့်မယ်။`
      : '❌ ' + (d.message ?? 'ငွေသွင်းရာတွင်ပြဿနာ'));
  } catch { tg.showAlert('❌ Server ချိတ်ဆက်မရ'); }
  closeModal('dep');
};

/* ── Withdraw ────────────────────────────────────────────────────────────── */
window.submitWithdraw = async () => {
  const name   = $('wName').value.trim();
  const phone  = $('wPhone').value.trim();
  const amount = parseInt($('wAmount').value);
  const curBal = parseInt(DOM.balance.textContent.replace(/,/g, ''));
  if (!name || !phone || !amount) { tg.showAlert('❌ အချက်အလက်အပြည့်ထည့်ပါ။'); return; }
  if (amount > curBal)            { tg.showAlert('❌ လက်ကျန်မလုံလောက်');         return; }
  try {
    const r = await fetch(`${BACKEND}/api/withdraw`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: state.telegramId, username: state.username, name, phone, amount }),
    });
    const d = await r.json();
    if (d.success) {
      if (d.newBalance != null) setBalance(d.newBalance);
      tg.showAlert(
        `✅ ငွေထုတ်တောင်းဆိုချက် (${amount.toLocaleString()} MMK) ပို့ပြီးပါပြီ။\n` +
        `Admin စစ်ဆေးနေပါသည်။ Reject ဖြစ်ပါက ပိုက်ဆံပြန်ရမည်ဖြစ်ပါသည်။`
      );
    } else {
      tg.showAlert('❌ ' + (d.message ?? 'ငွေထုတ်ရာတွင်ပြဿနာ'));
    }
  } catch { tg.showAlert('❌ Server ချိတ်ဆက်မရ'); }
  closeModal('with');
};
