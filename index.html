<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRASH PRO - ULTIMATE UI</title>
    <!-- Socket.io Client SDK -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --success: #00ff88;
            --danger: #ff3366;
            --bg-dark: #060912;
            --card-bg: rgba(16, 20, 35, 0.95);
            --countdown-bg: rgba(0, 0, 0, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 10% 10%, rgba(0, 242, 255, 0.05) 0%, transparent 30%);
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-shell {
            width: 100%;
            max-width: 480px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        /* --- HEADER SECTION --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }

        .user-stats {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .user-badge {
            background: linear-gradient(90deg, var(--secondary), transparent);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            border-left: 3px solid var(--primary);
            color: #fff;
        }

        .balance-display {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .nav-btns {
            display: flex;
            gap: 8px;
        }

        .action-sm {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-sm.deposit { border-color: var(--success); color: var(--success); }
        .action-sm.withdraw { border-color: #ff9900; color: #ff9900; }

        /* --- COUNTDOWN OVERLAY --- */
        .countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--countdown-bg);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .countdown-box {
            text-align: center;
        }

        .countdown-number {
            font-size: 8rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 30px var(--primary);
            animation: pulse 1s infinite;
        }

        .countdown-text {
            font-size: 2rem;
            color: white;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- MULTIPLIER SECTION --- */
        .main-display {
            background: var(--card-bg);
            height: 200px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            margin: 10px 0;
        }

        .multiplier-val {
            font-size: 5.5rem;
            font-weight: 900;
            z-index: 1;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0,242,255,0.5));
            letter-spacing: -2px;
        }

        /* --- BETTING CONTROLS --- */
        .control-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .amount-input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            color: var(--primary);
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            outline: none;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .q-chip {
            background: #1a1f2e;
            padding: 12px 5px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
            cursor: pointer;
            border: 1px solid transparent;
            font-weight: bold;
            color: #ccc;
            transition: all 0.2s;
        }

        .q-chip:hover { border-color: var(--primary); color: white; }
        .q-chip.disabled { opacity: 0.5; pointer-events: none; }

        .main-actions {
            display: flex;
            gap: 12px;
        }

        .btn-play {
            flex: 1;
            padding: 20px;
            border-radius: 15px;
            border: none;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.1s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-play:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-start { 
            background: var(--success); 
            color: #003311; 
            box-shadow: 0 4px 20px rgba(0,255,136,0.4); 
        }
        
        .btn-stop { 
            background: var(--danger); 
            color: #fff; 
            box-shadow: 0 4px 20px rgba(255,51,102,0.4); 
        }
        
        .btn-play:active:not(:disabled) { transform: scale(0.95); }

        /* --- HISTORY TABLE --- */
        .history-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 18px;
            flex-grow: 1;
        }

        .table-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            padding-bottom: 12px;
            border-bottom: 1px solid #333;
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            font-weight: bold;
        }

        .history-list {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            font-size: 0.9rem;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-weight: 500;
        }

        .val-win { color: var(--success); font-weight: bold; }
        .val-loss { color: var(--danger); font-weight: bold; }
        .bot-username { color: #ff9900; font-style: italic; }

        /* --- MODAL --- */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 400px;
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 30px rgba(0,242,255,0.3);
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .modal-input:focus {
            border-color: var(--primary);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn.submit {
            background: var(--primary);
            color: #000;
        }

        .modal-btn.cancel {
            background: #333;
            color: white;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,242,255,0.3);
        }

        .modal-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <!-- Countdown Overlay -->
        <div class="countdown-overlay" id="countdownOverlay">
            <div class="countdown-box">
                <div class="countdown-number" id="countdownNumber">3</div>
                <div class="countdown-text" id="countdownText">GET READY</div>
            </div>
        </div>

        <header class="header">
            <div class="user-stats">
                <div class="user-badge" id="username">TG_USERNAME</div>
                <div class="balance-display"><span id="balance">1,000</span> <small style="font-size: 0.75rem; color: #666;">MMK</small></div>
            </div>
            <div class="nav-btns">
                <button class="action-sm deposit" onclick="openDepositModal()">ငွေသွင်း</button>
                <button class="action-sm withdraw" onclick="openWithdrawModal()">ငွေထုတ်</button>
            </div>
        </header>

        <section class="main-display">
            <div class="multiplier-val" id="multiplier">00.0x</div>
        </section>

        <section class="control-panel">
            <input type="number" class="amount-input" value="1000" id="betAmount" placeholder="ငွေပမာဏ">
            
            <div class="quick-grid">
                <div class="q-chip" onclick="setBet(500)">500</div>
                <div class="q-chip" onclick="setBet(1000)">1,000</div>
                <div class="q-chip" onclick="setBet(5000)">5,000</div>
                <div class="q-chip" onclick="setBet(10000)">10,000</div>
            </div>

            <div class="main-actions">
                <button class="btn-play btn-start" id="startBtn" disabled>START</button>
                <button class="btn-play btn-stop" id="stopBtn" style="display:none">STOP</button>
            </div>
        </section>

        <section class="history-card">
            <div class="table-header">
                <span>ကစားသမား</span>
                <span>စတင်</span>
                <span>ရပ်တန့်</span>
            </div>
            <div class="history-list" id="historyList"></div>
        </section>
    </div>

    <!-- Deposit Modal -->
    <div class="modal" id="depositModal">
        <div class="modal-content">
            <div class="modal-title">💰 ငွေသွင်းရန်</div>
            <input type="text" class="modal-input" id="depositName" placeholder="သင့်နာမည်">
            <input type="text" class="modal-input" id="depositPhone" placeholder="ဖုန်းနံပါတ်">
            <input type="number" class="modal-input" id="depositAmount" placeholder="ငွေပမာဏ">
            <div class="modal-buttons">
                <button class="modal-btn submit" onclick="submitDeposit()">အတည်ပြုမည်</button>
                <button class="modal-btn cancel" onclick="closeDepositModal()">ဖျက်သိမ်းမည်</button>
            </div>
        </div>
    </div>

    <!-- Withdraw Modal -->
    <div class="modal" id="withdrawModal">
        <div class="modal-content">
            <div class="modal-title">💸 ငွေထုတ်ရန်</div>
            <input type="text" class="modal-input" id="withdrawName" placeholder="KPay အကောင့်နာမည်">
            <input type="text" class="modal-input" id="withdrawPhone" placeholder="KPay ဖုန်းနံပါတ်">
            <input type="number" class="modal-input" id="withdrawAmount" placeholder="ငွေပမာဏ">
            <div class="modal-buttons">
                <button class="modal-btn submit" onclick="submitWithdraw()">အတည်ပြုမည်</button>
                <button class="modal-btn cancel" onclick="closeWithdrawModal()">ဖျက်သိမ်းမည်</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // TELEGRAM WEB APP INTEGRATION
        // ============================================
        
        // Initialize Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Backend URL
        const BACKEND_URL = 'https://crashgame-money2.onrender.com';
        
        // Global variables
        window.telegramId = null;
        window.telegramUser = null;
        window.socket = null;
        window.isGameRunning = false;
        window.canBet = false;
        window.bettingLocked = false;
        
        // Get user data from Telegram
        const user = tg.initDataUnsafe?.user;
        
        console.log('Telegram initData:', tg.initDataUnsafe);
        
        if (user) {
            console.log('Telegram User found:', user);
            
            // Format username
            let usernameDisplay = '';
            if (user.username) {
                usernameDisplay = user.username;
            } else if (user.first_name) {
                usernameDisplay = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            } else {
                usernameDisplay = 'User_' + user.id.toString().slice(-4);
            }
            
            document.getElementById('username').textContent = usernameDisplay;
            window.telegramId = user.id.toString();
            
            // Authenticate with backend
            fetch(`${BACKEND_URL}/api/auth`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    id: user.id,
                    username: usernameDisplay,
                    first_name: user.first_name || '',
                    last_name: user.last_name || ''
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('balance').textContent = data.user.balance.toLocaleString();
                    window.telegramUser = data.user;
                    console.log('Auth successful:', data.user);
                    
                    // Initialize Socket.io after auth
                    initializeSocket();
                } else {
                    console.error('Auth failed:', data);
                }
            })
            .catch(err => {
                console.error('Auth error:', err);
                initializeSocket();
            });
        } else {
            console.log('No Telegram user found - using test mode');
            window.telegramId = 'test_user_' + Math.random().toString(36).substr(2, 5);
            document.getElementById('username').textContent = 'Test User';
            initializeSocket();
        }
        
        // Initialize Socket.io
        function initializeSocket() {
            console.log('Initializing socket with userId:', window.telegramId);
            
            window.socket = io(BACKEND_URL, {
                query: { userId: window.telegramId },
                transports: ['websocket', 'polling']
            });
            
            window.socket.on('connect', () => {
                console.log('Socket connected with ID:', window.socket.id);
                window.socket.emit('authenticate', { userId: window.telegramId });
            });
            
            window.socket.on('countdown', (data) => {
                startCountdown(data.seconds);
                window.canBet = true;
                window.bettingLocked = false;
                document.getElementById('startBtn').disabled = false;
                document.querySelectorAll('.q-chip').forEach(chip => chip.classList.remove('disabled'));
            });
            
            window.socket.on('gameStart', () => {
                window.canBet = false;
                window.bettingLocked = true;
                document.getElementById('startBtn').disabled = true;
                document.querySelectorAll('.q-chip').forEach(chip => chip.classList.add('disabled'));
            });
            
            window.socket.on('multiplier', (data) => {
                document.getElementById('multiplier').textContent = data.multiplier.toFixed(2) + 'x';
                window.isGameRunning = data.gameState === 'running';
            });
            
            window.socket.on('gameCrashed', (data) => {
                console.log('Game crashed at:', data.multiplier);
                document.getElementById('multiplier').style.color = 'var(--danger)';
                setTimeout(() => {
                    document.getElementById('multiplier').style.color = '';
                }, 500);
                
                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('stopBtn').style.display = 'none';
            });
            
            window.socket.on('balanceUpdate', (data) => {
                if (data.userId === window.telegramId) {
                    document.getElementById('balance').textContent = data.balance.toLocaleString();
                }
            });
            
            window.socket.on('activeBets', (data) => {
                updateActiveBets(data.bets);
            });
            
            window.socket.on('newHistory', (data) => {
                addHistoryItem(data);
            });
            
            window.socket.on('betResult', (data) => {
                if (data.success) {
                    if (data.type === 'cashout') {
                        tg.showAlert(`✅ Cashout အောင်မြင်သည်!\nMultiplier: ${data.multiplier}x\nအမြတ်: ${data.profit} MMK`);
                    }
                }
            });
            
            window.socket.on('disconnect', () => {
                console.log('Socket disconnected');
                setTimeout(() => {
                    window.socket.connect();
                }, 1000);
            });
        }
        
        // ============================================
        // COUNTDOWN FUNCTION
        // ============================================
        
        function startCountdown(seconds) {
            const overlay = document.getElementById('countdownOverlay');
            const numberEl = document.getElementById('countdownNumber');
            const textEl = document.getElementById('countdownText');
            
            overlay.style.display = 'flex';
            
            let count = seconds;
            numberEl.textContent = count;
            textEl.textContent = 'GET READY';
            
            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    numberEl.textContent = count;
                } else if (count === 0) {
                    numberEl.textContent = 'GO!';
                    textEl.textContent = '';
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        overlay.style.display = 'none';
                    }, 500);
                }
            }, 1000);
        }
        
        // ============================================
        // BETTING FUNCTIONS
        // ============================================
        
        window.setBet = function(val) {
            document.getElementById('betAmount').value = val;
        };
        
        // Start Button
        document.getElementById('startBtn').onclick = function() {
            if (!window.canBet || window.bettingLocked) {
                tg.showAlert('❌ ယခုအချိန်တွင် Bet လောင်း၍မရပါ။ Countdown ကိုစောင့်ပါ။');
                return;
            }
            
            const betAmount = parseFloat(document.getElementById('betAmount').value);
            const balanceText = document.getElementById('balance').textContent.replace(/,/g, '');
            const currentBalance = parseFloat(balanceText);
            
            console.log('Start clicked:', { betAmount, currentBalance, telegramId: window.telegramId });
            
            if (!betAmount || betAmount <= 0) {
                tg.showAlert('❌ ငွေပမာဏ အမှန်အကန်ထည့်ပါ။');
                return;
            }
            
            if (betAmount > currentBalance) {
                tg.showAlert('❌ လက်ကျန်ငွေ မလုံလောက်ပါ။');
                return;
            }
            
            if (!window.telegramId) {
                tg.showAlert('❌ User ID မရှိပါ။');
                return;
            }
            
            if (!window.socket || !window.socket.connected) {
                tg.showAlert('❌ Server နှင့် ချိတ်ဆက်မှု မရှိပါ။');
                return;
            }
            
            window.socket.emit('placeBet', {
                userId: window.telegramId,
                username: document.getElementById('username').textContent,
                amount: betAmount
            }, (response) => {
                console.log('placeBet response:', response);
                if (response && response.success) {
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('stopBtn').style.display = 'block';
                    
                    if (response.newBalance) {
                        document.getElementById('balance').textContent = response.newBalance.toLocaleString();
                    }
                } else {
                    tg.showAlert(response?.message || 'Bet လောင်းရာတွင် ပြဿနာရှိသည်။');
                }
            });
        };
        
        // Stop Button
        document.getElementById('stopBtn').onclick = function() {
            if (!window.isGameRunning) {
                tg.showAlert('❌ ဂိမ်းအလုပ်လုပ်နေချိန်မှသာ Stop နှိပ်ပါ။');
                return;
            }
            
            const multiplierText = document.getElementById('multiplier').textContent.replace('x', '');
            const currentMultiplier = parseFloat(multiplierText);
            
            console.log('Stop clicked:', { currentMultiplier, telegramId: window.telegramId });
            
            window.socket.emit('cashOut', {
                userId: window.telegramId,
                multiplier: currentMultiplier
            }, (response) => {
                console.log('cashOut response:', response);
                if (response && response.success) {
                    document.getElementById('stopBtn').style.display = 'none';
                    document.getElementById('startBtn').style.display = 'block';
                    
                    if (response.newBalance) {
                        document.getElementById('balance').textContent = response.newBalance.toLocaleString();
                    }
                } else {
                    tg.showAlert(response?.message || 'Cashout လုပ်ရာတွင် ပြဿနာရှိသည်။');
                }
            });
        };
        
        // ============================================
        // DEPOSIT MODAL FUNCTIONS
        // ============================================
        
        window.openDepositModal = function() {
            document.getElementById('depositModal').style.display = 'flex';
        };
        
        window.closeDepositModal = function() {
            document.getElementById('depositModal').style.display = 'none';
            // Clear inputs
            document.getElementById('depositName').value = '';
            document.getElementById('depositPhone').value = '';
            document.getElementById('depositAmount').value = '';
        };
        
        window.submitDeposit = function() {
            const name = document.getElementById('depositName').value.trim();
            const phone = document.getElementById('depositPhone').value.trim();
            const amount = document.getElementById('depositAmount').value.trim();
            
            if (!name || !phone || !amount) {
                tg.showAlert('❌ နာမည်၊ ဖုန်းနံပါတ်နှင့် ငွေပမာဏ အပြည့်အစုံထည့်ပါ။');
                return;
            }
            
            if (isNaN(amount) || parseInt(amount) <= 0) {
                tg.showAlert('❌ ငွေပမာဏ မှန်ကန်စွာထည့်ပါ။');
                return;
            }
            
            // Send to admin directly (not to group)
            tg.sendData(JSON.stringify({
                type: 'deposit',
                name: name,
                phone: phone,
                amount: parseInt(amount),
                userId: window.telegramId,
                username: document.getElementById('username').textContent
            }));
            
            // Close modal immediately
            window.closeDepositModal();
            
            // Show confirmation
            tg.showAlert(`✅ ငွေသွင်းရန် တောင်းဆိုချက် (${amount} MMK) ကို ပို့လိုက်ပါပြီ။ Admin အတည်ပြုပါလိမ့်မယ်။`);
        };
        
        // ============================================
        // WITHDRAW MODAL FUNCTIONS
        // ============================================
        
        window.openWithdrawModal = function() {
            document.getElementById('withdrawModal').style.display = 'flex';
        };
        
        window.closeWithdrawModal = function() {
            document.getElementById('withdrawModal').style.display = 'none';
            // Clear inputs
            document.getElementById('withdrawName').value = '';
            document.getElementById('withdrawPhone').value = '';
            document.getElementById('withdrawAmount').value = '';
        };
        
        window.submitWithdraw = function() {
            const name = document.getElementById('withdrawName').value.trim();
            const phone = document.getElementById('withdrawPhone').value.trim();
            const amount = document.getElementById('withdrawAmount').value.trim();
            
            if (!name || !phone || !amount) {
                tg.showAlert('❌ နာမည်၊ ဖုန်းနံပါတ်နှင့် ငွေပမာဏ အပြည့်အစုံထည့်ပါ။');
                return;
            }
            
            if (isNaN(amount) || parseInt(amount) <= 0) {
                tg.showAlert('❌ ငွေပမာဏ မှန်ကန်စွာထည့်ပါ။');
                return;
            }
            
            const currentBalance = parseInt(document.getElementById('balance').textContent.replace(/,/g, ''));
            if (parseInt(amount) > currentBalance) {
                tg.showAlert('❌ လက်ကျန်ငွေ မလုံလောက်ပါ။');
                return;
            }
            
            // Send to admin directly (not to group)
            tg.sendData(JSON.stringify({
                type: 'withdraw',
                name: name,
                phone: phone,
                amount: parseInt(amount),
                userId: window.telegramId,
                username: document.getElementById('username').textContent
            }));
            
            // Close modal immediately
            window.closeWithdrawModal();
            
            // Show confirmation
            tg.showAlert(`✅ ငွေထုတ်ရန် တောင်းဆိုချက် (${amount} MMK) ကို ပို့လိုက်ပါပြီ။ Admin အတည်ပြုပါလိမ့်မယ်။`);
        };
        
        // ============================================
        // HISTORY FUNCTIONS
        // ============================================
        
        function addHistoryItem(data) {
            const historyList = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'history-item';
            
            const usernameClass = data.isBot ? 'bot-username' : '';
            let resultClass = '';
            let stopText = '';
            
            if (data.stop) {
                if (data.stop > data.start) {
                    resultClass = 'val-win';
                    stopText = data.stop.toFixed(2) + 'x';
                } else {
                    resultClass = 'val-loss';
                    stopText = 'CRASH';
                }
            } else {
                stopText = 'Wait..';
            }
            
            item.innerHTML = `
                <span class="${usernameClass}">${data.username || 'Player'}</span>
                <span>${data.start.toFixed(2)}x</span>
                <span class="${resultClass}">${stopText}</span>
            `;
            
            historyList.insertBefore(item, historyList.firstChild);
            
            while (historyList.children.length > 15) {
                historyList.removeChild(historyList.lastChild);
            }
        }
        
        function updateActiveBets(bets) {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            bets.forEach(bet => {
                const item = document.createElement('div');
                item.className = 'history-item';
                const usernameClass = bet.isBot ? 'bot-username' : '';
                
                item.innerHTML = `
                    <span class="${usernameClass}">${bet.username}</span>
                    <span>1.00x</span>
                    <span style="color:#666">Playing..</span>
                `;
                historyList.appendChild(item);
            });
        }
        
        // Set color scheme
        tg.setHeaderColor('#060912');
        tg.setBackgroundColor('#060912');
        
        console.log('✅ Telegram Web App initialized');
    </script>
</body>
</html>
